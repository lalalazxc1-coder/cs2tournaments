version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: cs2_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-cs2_tournament_prod}
      MYSQL_USER: ${DB_USER:-your_db_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-your_db_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: cs2_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cs2_backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=${DB_USER:-your_db_user}
      - DB_PASSWORD=${DB_PASSWORD:-your_db_password}
      - DB_NAME=${DB_NAME:-cs2_tournament_prod}
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - SESSION_SECRET=${SESSION_SECRET:-super_secret_session_key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super_secret_jwt_key}
      - PORT=5000
    # Add other necessary env variables from .env here
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/public/uploads

  # React + Vite Frontend (served by Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cs2_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    # We remove explicit API mapping since it's hardcoded to /api/ in the Nginx conf now.

volumes:
  db_data:
  redis_data:
  backend_uploads:
